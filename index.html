<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Empleados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Módulo de Evaluación</h1>
    <hr>

    <div class="table-responsive" id="listaEmpleados">
        <h2>Seleccione a quién evaluar</h2>
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Puesto</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaPendientes"></tbody>
        </table>
    </div>

    <div id="evaluacion" class="table-responsive oculto">
        <h2 id="tituloEmpleado" style="color:#d35400;"></h2>
        <div class="controles">
            <button onclick="agregarItem('habilidades')">+ Habilidad</button>
            <button onclick="agregarItem('conocimientos')">+ Conocimiento</button>
            <button onclick="agregarItem('antropometria')">+ Antropometría</button>
            <button onclick="cancelarEvaluacion()" class="btn-eliminar">Cancelar</button>
        </div>
        <table class="matriz">
            <thead>
                <tr>
                    <th>Concepto a Evaluar</th>
                    <th>0</th><th>1</th><th>2</th><th>3</th><th>4</th>
                </tr>
            </thead>
            <tbody id="tablaMatriz">
                <tr class="seccion" id="sec-habilidades"><td colspan="6">HABILIDADES</td></tr>
                <tr class="seccion" id="sec-conocimientos"><td colspan="6">CONOCIMIENTOS</td></tr>
                <tr class="seccion" id="sec-antropometria"><td colspan="6">MEDIDAS ANTROPOMÉTRICAS</td></tr>
            </tbody>
        </table>
        <button class="btn-guardar" onclick="guardarEvaluacion()">Guardar Evaluación</button>
    </div>

    <div class="table-responsive">
        <h2>Resultados Finales</h2>
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Puesto</th>
                    <th>Puntaje Total</th>
                    <th>% Aplica</th>
                    <th>Resultado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaResultados"></tbody>
        </table>
    </div>

    <div id="modalEvaluacion" class="modal oculto">
        <div class="modal-contenido">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <h2 id="modalNombre">Detalles de la Evaluación</h2>
            <div id="modalDetalles"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNokOSiV483vppPmDwtWs0nH1evzZwbjU",
            authDomain: "matriz-de-habilidades-c4bd5.firebaseapp.com",
            databaseURL: "https://matriz-de-habilidades-c4bd5-default-rtdb.firebaseio.com",
            projectId: "matriz-de-habilidades-c4bd5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'matriz_habilidades');
        const PIN_ACCESO = "1432";

        let empleados = [];
        let criteriosPorPuesto = {};
        let empleadoActual = null;

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            empleados = data?.empleados || [];
            criteriosPorPuesto = data?.criterios || {};
            renderizarTablas();
        });

        const sincronizar = () => set(dbRef, { empleados, criterios: criteriosPorPuesto });

        function renderizarTablas() {
            document.getElementById("tablaPendientes").innerHTML = empleados.map((e, i) => `
                <tr>
                    <td>${e.nombre}</td>
                    <td>${e.puesto}</td>
                    <td>${e.evaluacion ? '✅ Evaluado' : '⏳ Pendiente'}</td>
                    <td>
                        <button onclick="iniciarEvaluacion(${i})">${e.evaluacion ? 'Re-evaluar' : 'Evaluar'}</button>
                        <button class="btn-eliminar" onclick="eliminarEmpleado(${i})">🗑️ Eliminar</button>
                    </td>
                </tr>
            `).join('');

            document.getElementById("tablaResultados").innerHTML = empleados.filter(e => e.evaluacion).map((e, i) => {
                let realIndex = empleados.indexOf(e);
                return `
                <tr class="${e.evaluacion.resultado === 'Apto' ? 'apto' : 'no-apto'}">
                    <td>${e.nombre}</td>
                    <td>${e.puesto}</td>
                    <td>${e.evaluacion.totalSuma}</td>
                    <td>${e.evaluacion.porcentajeAplica}%</td>
                    <td>${e.evaluacion.resultado}</td>
                    <td>
                        <button onclick="verEvaluacion(${realIndex})">👁️ Ver Detalles</button>
                        <button class="btn-excel" onclick="exportarExcelIndividual(${realIndex})">📊 Excel</button>
                    </td>
                </tr>
            `}).join('');
        }

        window.eliminarEmpleado = (index) => {
            if(confirm("¿Estás seguro de que deseas eliminar a este empleado del sistema?")) {
                empleados.splice(index, 1);
                sincronizar();
            }
        };

        window.iniciarEvaluacion = (index) => {
            let pass = prompt("🔒 Ingrese PIN de Evaluador:");
            if (pass !== PIN_ACCESO) return alert("PIN Incorrecto");

            empleadoActual = index;
            let emp = empleados[index];
            document.getElementById("tituloEmpleado").innerText = `Evaluando a: ${emp.nombre} - Puesto: ${emp.puesto}`;
            
            if (!criteriosPorPuesto[emp.puesto]) {
                criteriosPorPuesto[emp.puesto] = { habilidades: [], conocimientos: [], antropometria: [] };
            }

            document.getElementById("evaluacion").classList.remove("oculto");
            document.getElementById("listaEmpleados").classList.add("oculto");
            renderizarMatriz(emp.puesto);
        };

        window.cancelarEvaluacion = () => {
            document.getElementById("evaluacion").classList.add("oculto");
            document.getElementById("listaEmpleados").classList.remove("oculto");
            empleadoActual = null;
        };

        window.agregarItem = (tipo) => {
            let puesto = empleados[empleadoActual].puesto;
            let texto = prompt(`Nuevo concepto de ${tipo.toUpperCase()} para el puesto ${puesto}:`);
            if (texto) {
                if (!criteriosPorPuesto[puesto][tipo]) criteriosPorPuesto[puesto][tipo] = [];
                criteriosPorPuesto[puesto][tipo].push(texto);
                sincronizar();
                renderizarMatriz(puesto);
            }
        };

        window.eliminarItem = (tipo, index) => {
            if(confirm("¿Estás seguro de que deseas eliminar este concepto de la evaluación?")) {
                let puesto = empleados[empleadoActual].puesto;
                criteriosPorPuesto[puesto][tipo].splice(index, 1);
                sincronizar();
                renderizarMatriz(puesto);
            }
        };

        function renderizarMatriz(puesto) {
            document.querySelectorAll(".item-criterio").forEach(el => el.remove());
            const emp = empleados[empleadoActual];
            const render = (tipo, id) => {
                let root = document.getElementById(id);
                (criteriosPorPuesto[puesto][tipo] || []).forEach((texto, i) => {
                    let fila = document.createElement("tr");
                    fila.className = "item-criterio";
                    let key = `radio_${tipo}_${i}`;
                    let valor = emp.detalleEvaluacion ? emp.detalleEvaluacion.find(d => d.concepto === texto)?.valor : null;
                    
                    fila.innerHTML = `
                        <td style="text-align:left; display:flex; justify-content:space-between; align-items:center;">
                            ${texto} 
                            <button class="btn-eliminar-small" onclick="eliminarItem('${tipo}', ${i})" title="Eliminar concepto">X</button>
                        </td>` + 
                        [0,1,2,3,4].map(v => `<td><input type="radio" name="${key}" value="${v}" ${valor == v ? 'checked' : ''}></td>`).join('');
                    root.insertAdjacentElement("afterend", fila);
                    root = fila;
                });
            };
            render("habilidades", "sec-habilidades");
            render("conocimientos", "sec-conocimientos");
            render("antropometria", "sec-antropometria");
        }

        window.guardarEvaluacion = () => {
            let emp = empleados[empleadoActual];
            let criterios = criteriosPorPuesto[emp.puesto];
            
            let datos = {
                habilidades: { sum: 0, n: 0 },
                conocimientos: { sum: 0, n: 0 },
                antropometria: { sum: 0, n: 0 }
            };
            let detalles = [];

            ['habilidades', 'conocimientos', 'antropometria'].forEach(t => {
                (criterios[t] || []).forEach((text, i) => {
                    let radio = document.querySelector(`input[name="radio_${t}_${i}"]:checked`);
                    if (radio) {
                        let v = parseInt(radio.value);
                        datos[t].sum += v;
                        datos[t].n++;
                        detalles.push({ concepto: text, valor: v, categoria: t.toUpperCase() });
                    }
                });
            });

            let catsEvaluadas = (datos.habilidades.n > 0 ? 1 : 0) + (datos.conocimientos.n > 0 ? 1 : 0) + (datos.antropometria.n > 0 ? 1 : 0);
            if (catsEvaluadas === 0) return alert("No hay respuestas marcadas para evaluar.");

            // Suma total de los puntos sacados
            let totalSuma = datos.habilidades.sum + datos.conocimientos.sum + datos.antropometria.sum;

            // Porcentajes por categoría = (Suma Cat * 100) / (Cant * 4 max)
            let pctHab = datos.habilidades.n > 0 ? (datos.habilidades.sum * 100) / (datos.habilidades.n * 4) : 0;
            let pctCon = datos.conocimientos.n > 0 ? (datos.conocimientos.sum * 100) / (datos.conocimientos.n * 4) : 0;
            let pctAnt = datos.antropometria.n > 0 ? (datos.antropometria.sum * 100) / (datos.antropometria.n * 4) : 0;

            // Sumatoria de los porcentajes sacados dividida entre 100 (y promediado entre las categorías evaluadas)
            let sumaPorcentajes = pctHab + pctCon + pctAnt; 
            let factorDecimalAplica = sumaPorcentajes / (catsEvaluadas * 100); // Esto da un número entre 0 y 1
            let factorDecimalNoAplica = 1 - factorDecimalAplica; // Restamos 1 menos el factor de Aplica

            let porcentajeAplicaFinal = (factorDecimalAplica * 100).toFixed(2);
            let porcentajeNoAplicaFinal = (factorDecimalNoAplica * 100).toFixed(2);

            emp.evaluacion = { 
                totalSuma, 
                pctHab: pctHab.toFixed(2), 
                pctCon: pctCon.toFixed(2), 
                pctAnt: pctAnt.toFixed(2),
                porcentajeAplica: porcentajeAplicaFinal,
                porcentajeNoAplica: porcentajeNoAplicaFinal,
                resultado: porcentajeAplicaFinal >= 70 ? "Apto" : "No apto" 
            };
            emp.detalleEvaluacion = detalles; 
            emp.fecha = new Date().toLocaleString();
            
            sincronizar();
            alert("⭐⭐ Evaluación Guardada Correctamente");
            cancelarEvaluacion();
        };

        // VENTANA PARA VER DETALLES DE EVALUACIÓN
        window.verEvaluacion = (index) => {
            let emp = empleados[index];
            document.getElementById("modalNombre").innerText = `Resultados de: ${emp.nombre} (${emp.puesto})`;
            
            let htmlDetalles = `
                <div style="display:flex; justify-content:space-around; background:#f4f4f4; padding:10px; border-radius:5px; margin-bottom:15px; text-align:center;">
                    <div><b>% Habilidades</b><br>${emp.evaluacion.pctHab}%</div>
                    <div><b>% Conocimientos</b><br>${emp.evaluacion.pctCon}%</div>
                    <div><b>% Antropometría</b><br>${emp.evaluacion.pctAnt}%</div>
                </div>
                <div style="text-align:center; font-size:18px; margin-bottom:15px;">
                    <p><b>Aplica (Factor / Promedio):</b> ${emp.evaluacion.porcentajeAplica}%</p>
                    <p><b>No Aplica (1 - Factor Aplica):</b> ${emp.evaluacion.porcentajeNoAplica}%</p>
                    <p><b>Puntos Totales Obtenidos:</b> ${emp.evaluacion.totalSuma}</p>
                </div>
                <table>
                    <thead><tr><th>Categoría</th><th>Concepto Evaluado</th><th>Calificación</th></tr></thead>
                    <tbody>
                        ${emp.detalleEvaluacion.map(d => `
                            <tr>
                                <td>${d.categoria}</td>
                                <td style="text-align:left;">${d.concepto}</td>
                                <td><b>${d.valor} / 4</b></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById("modalDetalles").innerHTML = htmlDetalles;
            document.getElementById("modalEvaluacion").classList.remove("oculto");
        };

        window.cerrarModal = () => {
            document.getElementById("modalEvaluacion").classList.add("oculto");
        };

        // EXPORTACIÓN A EXCEL POR EMPLEADO
        window.exportarExcelIndividual = (index) => {
            let emp = empleados[index];
            if (!emp || !emp.evaluacion) return alert("Empleado no evaluado.");

            let csv = "\ufeff"; 
            csv += "REPORTE DE EVALUACION DE PERSONAL\n\n";
            csv += `Nombre Empleado:,${emp.nombre}\n`;
            csv += `Puesto:,${emp.puesto}\n`;
            csv += `Cuadrilla:,${emp.cuadrilla || 'N/A'}\n`;
            csv += `Fecha Evaluacion:,${emp.fecha}\n\n`;
            
            csv += `PUNTOS TOTALES:,${emp.evaluacion.totalSuma}\n`;
            csv += `PORCENTAJE HABILIDADES:,${emp.evaluacion.pctHab}%\n`;
            csv += `PORCENTAJE CONOCIMIENTOS:,${emp.evaluacion.pctCon}%\n`;
            csv += `PORCENTAJE ANTROPOMETRIA:,${emp.evaluacion.pctAnt}%\n`;
            csv += `PORCENTAJE APLICA FINAL:,${emp.evaluacion.porcentajeAplica}%\n`;
            csv += `PORCENTAJE NO APLICA:,${emp.evaluacion.porcentajeNoAplica}%\n`;
            csv += `RESULTADO FINAL:,${emp.evaluacion.resultado}\n\n`;

            csv += "CATEGORIA,CONCEPTO EVALUADO,PUNTUACION\n";
            if (emp.detalleEvaluacion) {
                emp.detalleEvaluacion.forEach(item => {
                    csv += `"${item.categoria}","${item.concepto}",${item.valor}\n`;
                });
            }

            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let enlace = document.createElement("a");
            enlace.href = URL.createObjectURL(blob);
            enlace.download = `Evaluacion_${emp.nombre.replace(/\s+/g, '_')}.csv`;
            enlace.click();
        };
    </script>
</body>
</html>
